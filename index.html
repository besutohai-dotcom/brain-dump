<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ブレインダンプ">
  <meta name="theme-color" content="#5856d6">
  <title>ブレインダンプ</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f5f7;--surface:#fff;--border:#e5e5ea;
      --text:#1d1d1f;--muted:#8e8e93;
      --primary:#5856d6;--primary-h:#3634a3;
      --danger:#ff3b30;--success:#34c759;
      --radius:14px;--shadow:0 2px 12px rgba(0,0,0,.07);
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#1c1c1e;--surface:#2c2c2e;--border:#3a3a3c;
        --text:#f5f5f7;--muted:#8e8e93;
        --shadow:0 2px 12px rgba(0,0,0,.3);
      }
    }
    body{
      font-family:-apple-system,'Hiragino Sans','Hiragino Kaku Gothic ProN',
        'Noto Sans JP','Yu Gothic',sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }
    .app{
      max-width:780px;margin:0 auto;
      padding:calc(24px + env(safe-area-inset-top))
              calc(16px + env(safe-area-inset-right))
              calc(80px + env(safe-area-inset-bottom))
              calc(16px + env(safe-area-inset-left));
    }
    /* Header */
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .header-left{display:flex;align-items:baseline;gap:12px}
    .header h1{font-size:1.4rem;font-weight:700;letter-spacing:-.02em;color:var(--primary)}
    .stats{font-size:.8rem;color:var(--muted)}
    .header-right{display:flex;gap:8px}
    .btn-ghost{background:none;border:1px solid var(--border);border-radius:8px;
      padding:6px 12px;font-size:.82rem;font-family:inherit;cursor:pointer;
      color:var(--muted);transition:all .15s}
    .btn-ghost:hover{background:var(--border);color:var(--text)}
    .btn-ghost.danger:hover{background:#fff0ee;color:var(--danger);border-color:var(--danger)}
    .btn-ghost.lang-btn{font-weight:600;letter-spacing:.03em;color:var(--primary);border-color:var(--primary);padding:6px 10px}
    .btn-ghost.lang-btn:hover{background:var(--primary);color:#fff}
    /* Export dropdown */
    .export-wrap{position:relative}
    .export-menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--surface);
      border:1px solid var(--border);border-radius:10px;padding:4px;
      box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:100;min-width:180px;white-space:nowrap}
    .export-item{display:block;width:100%;padding:9px 14px;border:none;background:none;
      font-family:inherit;font-size:.85rem;color:var(--text);text-align:left;
      cursor:pointer;border-radius:7px;transition:background .12s}
    .export-item:hover{background:var(--border)}
    /* Settings */
    .settings-panel{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
    .settings-panel h3{font-size:.95rem;margin-bottom:8px}
    .settings-intro{font-size:.85rem;color:var(--muted);line-height:1.6;margin-bottom:12px}
    .settings-intro a{color:var(--primary)}
    .row{display:flex;gap:8px;margin-bottom:8px}
    .input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:8px;
      font-size:.9rem;font-family:inherit;outline:none;transition:border-color .15s;
      background:var(--surface);color:var(--text)}
    .input:focus{border-color:var(--primary)}
    .input.mono{font-family:'SF Mono',Menlo,monospace;font-size:.85rem}
    .hint{font-size:.78rem;color:var(--muted);line-height:1.5}
    /* Input card */
    .input-card{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
    .textarea-wrap{position:relative}
    .main-textarea{width:100%;min-height:96px;padding:10px 44px 10px 12px;
      border:1px solid var(--border);border-radius:10px;font-size:.95rem;
      font-family:inherit;line-height:1.65;resize:vertical;outline:none;
      transition:border-color .15s;background:var(--surface);color:var(--text)}
    .main-textarea:focus{border-color:var(--primary)}
    .main-textarea:disabled{opacity:.6}
    .input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
    /* Buttons */
    .btn-primary{background:var(--primary);color:#fff;border:none;border-radius:8px;
      padding:9px 18px;font-size:.88rem;font-family:inherit;font-weight:500;
      cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:6px}
    .btn-primary:hover:not(:disabled){background:var(--primary-h)}
    .btn-primary:disabled{opacity:.55;cursor:not-allowed}
    .btn-secondary{background:var(--surface);color:var(--primary);
      border:1.5px solid var(--primary);border-radius:8px;padding:9px 16px;
      font-size:.88rem;font-family:inherit;font-weight:500;cursor:pointer;
      transition:all .15s;white-space:nowrap}
    .btn-secondary:hover:not(:disabled){background:var(--primary);color:#fff}
    .btn-secondary:disabled{opacity:.5;cursor:not-allowed}
    /* Mic button */
    .mic-btn{position:absolute;right:8px;bottom:8px;width:30px;height:30px;
      border-radius:50%;border:none;background:none;cursor:pointer;
      font-size:1.1rem;display:flex;align-items:center;justify-content:center;
      color:var(--muted);transition:all .15s;flex-shrink:0}
    .mic-btn:hover{background:var(--border)}
    .mic-btn.recording{color:var(--danger);animation:pulse 1s ease-in-out infinite}
    .mic-btn-inline{width:32px;height:32px;border-radius:50%;border:none;background:none;
      cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;
      color:var(--muted);transition:all .15s;flex-shrink:0}
    .mic-btn-inline:hover{background:var(--border)}
    .mic-btn-inline.recording{color:var(--danger);animation:pulse 1s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.7}}
    .voice-status{font-size:.75rem;color:var(--danger);margin-top:4px;min-height:1em}
    /* Spinner */
    .spin{display:inline-block;width:12px;height:12px;border:2px solid currentColor;
      border-top-color:transparent;border-radius:50%;
      animation:spin .6s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Error */
    .error-banner{background:#fff5f5;border:1px solid #ffd5d5;color:var(--danger);
      border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:.88rem}
    @media(prefers-color-scheme:dark){
      .error-banner{background:#3a1a1a;border-color:#7a3a3a}
    }
    /* Toast (undo) */
    .toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;
      transform:translateX(-50%);background:#1d1d1f;color:#fff;border-radius:10px;
      padding:10px 16px;font-size:.88rem;display:flex;align-items:center;gap:12px;
      box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:999;
      animation:slideUp .2s ease}
    @keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .toast-undo{background:none;border:none;color:#a78bfa;font-size:.88rem;
      font-family:inherit;font-weight:600;cursor:pointer;padding:0}
    /* Query bar */
    .query-bar{display:flex;align-items:center;gap:6px;background:var(--surface);
      border:1px solid var(--border);border-radius:10px;padding:6px 8px 6px 14px;
      margin-bottom:12px;box-shadow:var(--shadow)}
    .query-icon{font-size:1rem;flex-shrink:0}
    .query-input{flex:1;border:none;outline:none;font-size:.88rem;
      font-family:inherit;background:transparent;color:var(--text)}
    .query-input::placeholder{color:var(--muted)}
    /* Query result */
    .query-result{background:#f3f4ff;border:1px solid #c9cbf5;
      border-radius:var(--radius);padding:16px;margin-bottom:16px}
    @media(prefers-color-scheme:dark){
      .query-result{background:#1e1e3a;border-color:#3a3a7a}
    }
    .qr-header{display:flex;justify-content:space-between;align-items:center;
      margin-bottom:10px;font-size:.88rem}
    .close-btn{background:none;border:none;cursor:pointer;color:var(--muted);
      font-size:1rem;padding:2px 6px;border-radius:4px}
    .close-btn:hover{background:rgba(128,128,128,.15)}
    .qr-body p{font-size:.9rem;line-height:1.75;color:var(--text)}
    .qr-body p:empty{display:none}
    /* Search bar */
    .search-bar{display:flex;align-items:center;gap:6px;background:var(--surface);
      border:1px solid var(--border);border-radius:10px;padding:6px 10px;
      margin-bottom:12px;box-shadow:var(--shadow)}
    .search-icon{font-size:.9rem;flex-shrink:0;color:var(--muted)}
    .search-input{flex:1;border:none;outline:none;font-size:.88rem;
      font-family:inherit;background:transparent;color:var(--text)}
    .search-input::placeholder{color:var(--muted)}
    .search-clear{background:none;border:none;cursor:pointer;color:var(--muted);
      font-size:.8rem;padding:2px 5px;border-radius:4px;line-height:1}
    .search-clear:hover{background:var(--border);color:var(--text)}
    /* Filter */
    .filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
    .chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;
      border-radius:20px;border:1px solid var(--border);background:var(--surface);
      font-size:.82rem;font-family:inherit;cursor:pointer;color:var(--muted);transition:all .15s}
    .chip-active{font-weight:500}
    .count{background:rgba(128,128,128,.15);border-radius:10px;padding:0 6px;font-size:.75rem}
    .chip-active .count{background:rgba(255,255,255,.25)}
    /* Task list */
    .task-list{display:flex;flex-direction:column;gap:10px}
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted);
      font-size:1rem;line-height:2.2}
    .empty-state small{font-size:.85rem}
    /* Swipe wrapper */
    .swipe-wrap{position:relative;overflow:hidden;border-radius:var(--radius);
      border:1px solid var(--border);box-shadow:var(--shadow);transition:box-shadow .15s}
    .swipe-wrap:hover{box-shadow:0 4px 20px rgba(0,0,0,.11)}
    .swipe-bg{position:absolute;top:0;bottom:0;width:64px;display:flex;
      align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;pointer-events:none}
    .swipe-bg-complete{left:0;background:var(--success);color:#fff}
    .swipe-bg-delete{right:0;background:var(--danger);color:#fff}
    /* Task card */
    .task-card{background:var(--surface);padding:16px;transition:opacity .2s;position:relative}
    .task-done{opacity:.55}
    .task-done .task-title{text-decoration:line-through;color:var(--muted)}
    .task-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .task-labels{display:flex;align-items:center;gap:8px}
    .tag{font-size:.75rem;font-weight:600;padding:3px 9px;border-radius:20px;border:1px solid}
    .task-date{font-size:.75rem;color:var(--muted)}
    .task-btns{display:flex;gap:4px}
    .icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);
      background:none;cursor:pointer;font-size:.88rem;color:var(--muted);
      display:flex;align-items:center;justify-content:center;transition:all .15s}
    .icon-btn:hover{background:var(--border);color:var(--text)}
    .icon-done{color:var(--success);border-color:var(--success)}
    .icon-done:hover{background:#e8faf0}
    .icon-del:hover{background:#fff0ee;color:var(--danger);border-color:var(--danger)}
    /* Edit mode */
    .edit-field{width:100%;padding:7px 10px;border:1px solid var(--primary);border-radius:8px;
      font-family:inherit;font-size:.95rem;font-weight:600;outline:none;
      background:var(--surface);color:var(--text);margin-bottom:6px}
    .edit-original{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;
      font-family:inherit;font-size:.855rem;outline:none;resize:vertical;min-height:60px;
      background:var(--surface);color:var(--text);margin-bottom:8px;line-height:1.5}
    .edit-original:focus{border-color:var(--primary)}
    .edit-actions{display:flex;gap:6px;margin-bottom:10px}
    .btn-save{background:var(--primary);color:#fff;border:none;border-radius:7px;
      padding:6px 14px;font-size:.83rem;font-family:inherit;font-weight:500;cursor:pointer}
    .btn-cancel{background:none;border:1px solid var(--border);border-radius:7px;
      padding:6px 12px;font-size:.83rem;font-family:inherit;color:var(--muted);cursor:pointer}
    .task-title{font-size:1rem;font-weight:600;line-height:1.45;
      margin-bottom:5px;letter-spacing:-.01em}
    .task-original{font-size:.855rem;color:var(--muted);line-height:1.65;margin-bottom:12px}
    /* Next actions */
    .actions-box{background:#f9f9ff;border-left:3px solid var(--primary);
      border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:10px}
    @media(prefers-color-scheme:dark){.actions-box{background:#1e1e3a}}
    .actions-label{font-size:.8rem;font-weight:600;margin-bottom:8px;color:var(--primary)}
    .actions-list{padding-left:18px;display:flex;flex-direction:column;gap:4px}
    .actions-list li{font-size:.855rem;line-height:1.55;color:var(--text)}
    /* Suggest btn */
    .suggest-btn{width:100%;padding:8px;background:none;border:1px dashed var(--border);
      border-radius:8px;font-size:.83rem;font-family:inherit;color:var(--muted);
      cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;
      justify-content:center;gap:6px}
    .suggest-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary);background:#f3f4ff}
    .suggest-btn:disabled{cursor:not-allowed}
    .no-voice{font-size:.75rem;color:var(--muted);margin-top:4px}
    /* Due date badge */
    .due-badge{font-size:.72rem;font-weight:600;padding:2px 8px;border-radius:10px;
      border:1px solid;letter-spacing:.01em;display:inline-flex;align-items:center;gap:3px}
    .due-overdue{color:var(--danger);border-color:#ff3b3055;background:#ff3b3018}
    .due-today{color:#ff9500;border-color:#ff950055;background:#ff950018}
    .due-future{color:var(--muted);border-color:var(--border);background:transparent}
    /* Due date input in edit mode */
    .edit-date-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .edit-date-label{font-size:.82rem;color:var(--muted);white-space:nowrap}
    .edit-date{padding:6px 10px;border:1px solid var(--border);border-radius:8px;
      font-family:inherit;font-size:.85rem;outline:none;background:var(--surface);
      color:var(--text);cursor:pointer}
    .edit-date:focus{border-color:var(--primary)}
    .btn-clear-date{background:none;border:none;cursor:pointer;color:var(--muted);
      font-size:.78rem;padding:2px 4px;border-radius:4px}
    .btn-clear-date:hover{color:var(--danger)}
    /* Priority badge */
    .priority-badge{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:10px;
      border:1px solid;cursor:pointer;transition:opacity .15s;letter-spacing:.02em;
      background:none;font-family:inherit;line-height:1.4}
    .priority-badge:hover{opacity:.65}
    @media(max-width:500px){
      .app{padding:16px 12px 60px}
      .header h1{font-size:1.2rem}
      .main-textarea{min-height:80px}
    }
    /* Onboarding */
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .onboarding-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);
      display:flex;align-items:center;justify-content:center;z-index:300;padding:16px;
      animation:fadeIn .2s ease}
    .onboarding-card{background:var(--surface);border-radius:20px;padding:32px 28px;
      max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;
      animation:slideUp .25s ease;position:relative}
    .onboarding-lang{position:absolute;top:14px;right:14px;background:none;
      border:1px solid var(--border);border-radius:7px;padding:4px 10px;
      font-size:.78rem;font-weight:600;color:var(--primary);border-color:var(--primary);
      cursor:pointer;font-family:inherit}
    .onboarding-lang:hover{background:var(--primary);color:#fff}
    .onboarding-icon{font-size:3rem;margin-bottom:12px}
    .onboarding-title{font-size:1.4rem;font-weight:700;margin-bottom:10px;color:var(--primary)}
    .onboarding-desc{font-size:.9rem;color:var(--muted);line-height:1.65;margin-bottom:24px}
    .onboarding-steps{text-align:left;display:flex;flex-direction:column;gap:14px;margin-bottom:28px}
    .onboarding-step{display:flex;align-items:flex-start;gap:12px}
    .onboarding-step-num{width:26px;height:26px;border-radius:50%;background:var(--primary);
      color:#fff;font-size:.82rem;font-weight:700;display:flex;align-items:center;
      justify-content:center;flex-shrink:0;margin-top:1px}
    .onboarding-step strong{font-size:.9rem;display:block;margin-bottom:2px}
    .onboarding-step p{font-size:.82rem;color:var(--muted);line-height:1.5;margin:0}
    .onboarding-btn{width:100%;justify-content:center;padding:12px;font-size:.95rem;margin-bottom:10px}
    .onboarding-skip{background:none;border:none;font-size:.82rem;color:var(--muted);
      cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:6px}
    .onboarding-skip:hover{color:var(--text);background:var(--border)}
  </style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { h, render, Fragment } from 'https://esm.sh/preact@10.24.3'
import { useState, useEffect, useCallback, useRef } from 'https://esm.sh/preact@10.24.3/hooks'

// ─── Speech Recognition ───────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition
const IS_PWA = window.navigator.standalone === true
const VOICE_OK = !!SR && !IS_PWA

function useSpeech(onResult, lang) {
  const [listening, setListening] = useState(false)
  const recRef = useRef(null)
  const start = useCallback(() => {
    if (!VOICE_OK) return
    const rec = new SR()
    rec.lang = lang === 'en' ? 'en-US' : 'ja-JP'
    rec.interimResults = false; rec.maxAlternatives = 1
    rec.onresult = e => onResult(e.results[0][0].transcript)
    rec.onend = () => setListening(false)
    rec.onerror = () => setListening(false)
    rec.start(); recRef.current = rec; setListening(true)
  }, [onResult, lang])
  const stop = useCallback(() => { recRef.current?.stop(); setListening(false) }, [])
  const toggle = useCallback(() => listening ? stop() : start(), [listening, start, stop])
  return { listening, toggle, supported: VOICE_OK }
}

// ─── Claude API ───────────────────────────────────────────────────
async function callClaude(apiKey, prompt, maxTokens = 512) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }],
    }),
  })
  if (!res.ok) {
    const err = await res.json().catch(() => ({}))
    throw new Error(err?.error?.message || `API error: ${res.status}`)
  }
  return (await res.json()).content[0]?.text ?? ''
}

async function categorizeTask(apiKey, text, existingCategories, lang) {
  if (lang === 'en') {
    const catStr = existingCategories.length ? `Existing categories: ${existingCategories.join(', ')}` : 'Existing categories: none'
    const raw = await callClaude(apiKey,
      `${catStr}\n\nInput text: "${text}"\n\nUse an existing category if suitable, otherwise create a new one (Work/Health/Learning/Family/Hobbies/Shopping/Self-improvement/Relationships etc.).\n\nReturn JSON only: {"title":"concise title","category":"category name"}`, 200)
    const m = raw.match(/\{[^{}]*\}/)
    if (!m) throw new Error('Categorization failed')
    return JSON.parse(m[0])
  }
  const catStr = existingCategories.length ? `既存カテゴリ: ${existingCategories.join('、')}` : '既存カテゴリ: なし'
  const raw = await callClaude(apiKey,
    `${catStr}\n\n入力テキスト: "${text}"\n\n既存カテゴリに合うものがあればそれを使用。なければ新規作成（仕事/健康/学習/家族/趣味/買い物/自己啓発/人間関係 など）。\n\nJSONのみ返してください：{"title":"簡潔なタイトル","category":"カテゴリ名"}`, 200)
  const m = raw.match(/\{[^{}]*\}/)
  if (!m) throw new Error('分類に失敗しました')
  return JSON.parse(m[0])
}

async function getNextActions(apiKey, task, lang) {
  if (lang === 'en') {
    const raw = await callClaude(apiKey,
      `Task "${task.title}" (${task.category}): suggest 3-5 concrete next actions.\nOriginal note: "${task.originalText}"\nReturn a JSON array only: ["action1","action2","action3"]`, 512)
    const m = raw.match(/\[[\s\S]*?\]/)
    if (!m) throw new Error('Failed to get suggestions')
    return JSON.parse(m[0])
  }
  const raw = await callClaude(apiKey,
    `タスク「${task.title}」（${task.category}）の具体的な次のアクションを3〜5個提案してください。\n元のメモ: "${task.originalText}"\nJSON配列のみ：["アクション1","アクション2","アクション3"]`, 512)
  const m = raw.match(/\[[\s\S]*?\]/)
  if (!m) throw new Error('提案の取得に失敗しました')
  return JSON.parse(m[0])
}

async function queryTasks(apiKey, query, tasks, lang) {
  if (lang === 'en') {
    const summary = tasks.length === 0 ? 'No tasks'
      : tasks.map(t => `[${t.category}] ${t.title} (${t.status === 'done' ? 'done' : 'active'}): ${t.originalText}`).join('\n')
    return callClaude(apiKey, `Task list:\n${summary}\n\nQuestion: ${query}\n\nAnswer concisely in English.`, 1024)
  }
  const summary = tasks.length === 0 ? 'タスクはありません'
    : tasks.map(t => `[${t.category}] ${t.title}（${t.status === 'done' ? '完了' : '未完了'}）: ${t.originalText}`).join('\n')
  return callClaude(apiKey, `タスクリスト:\n${summary}\n\n質問: ${query}\n\n日本語で具体的・簡潔に答えてください。`, 1024)
}

const formatDate = (isoDate, locale) => new Date(isoDate + 'T00:00:00').toLocaleDateString(locale, { month: 'numeric', day: 'numeric' })

const getDueDateInfo = (dueDate, T) => {
  if (!dueDate) return null
  const today = new Date().toISOString().slice(0, 10)
  if (dueDate < today) return { cls: 'due-overdue', label: `⚠️ ${formatDate(dueDate, T.locale)}` }
  if (dueDate === today) return { cls: 'due-today', label: `${T.today} ${formatDate(dueDate, T.locale)}` }
  return { cls: 'due-future', label: `📅 ${formatDate(dueDate, T.locale)}` }
}

const PRIORITY_COLORS = { high: '#ff3b30', medium: '#ff9500', low: '#8e8e93' }
const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 }
const cyclePriority = p => p === 'high' ? 'medium' : p === 'medium' ? 'low' : 'high'

// ─── SwipeCard ────────────────────────────────────────────────────
function SwipeCard({ children, isDone, disabled, onComplete, onDelete }) {
  const [dx, setDx] = useState(0)
  const s = useRef({ startX:0, startY:0, axis:null, dx:0, active:false })
  const wrapRef = useRef(null)
  const THRESHOLD = 72

  useEffect(() => {
    const el = wrapRef.current
    if (!el) return
    const onMove = e => {
      const st = s.current
      if (!st.active) return
      const diffX = e.touches[0].clientX - st.startX
      const diffY = e.touches[0].clientY - st.startY
      if (!st.axis) st.axis = Math.abs(diffX) > Math.abs(diffY) ? 'h' : 'v'
      if (st.axis === 'h') {
        e.preventDefault()
        st.dx = diffX
        setDx(diffX)
      }
    }
    el.addEventListener('touchmove', onMove, { passive: false })
    return () => el.removeEventListener('touchmove', onMove)
  }, [])

  const onTouchStart = e => {
    const st = s.current
    if (disabled) { st.active = false; return }
    st.active = true
    st.startX = e.touches[0].clientX
    st.startY = e.touches[0].clientY
    st.axis = null
    st.dx = 0
  }

  const onTouchEnd = () => {
    const d = s.current.dx
    if (d > THRESHOLD) onComplete?.()
    else if (d < -THRESHOLD) onDelete?.()
    setDx(0)
    s.current.dx = 0
    s.current.axis = null
    s.current.active = false
  }

  const progress = Math.min(Math.abs(dx) / THRESHOLD, 1)

  return h('div', { ref: wrapRef, class: 'swipe-wrap', onTouchStart, onTouchEnd },
    h('div', { class: 'swipe-bg swipe-bg-complete', style: `opacity:${dx > 0 ? progress : 0}` }, '✓'),
    h('div', { class: 'swipe-bg swipe-bg-delete', style: `opacity:${dx < 0 ? progress : 0}` }, '✕'),
    h('div', {
      class: `task-card${isDone ? ' task-done' : ''}`,
      style: dx !== 0
        ? `transform:translateX(${dx}px);transition:none`
        : 'transform:translateX(0);transition:transform .25s ease',
    }, children)
  )
}

function Onboarding({ lang, onGetStarted, onSkip, onToggleLang }) {
  const T = TRANSLATIONS[lang].onboarding
  return h('div', { class: 'onboarding-overlay' },
    h('div', { class: 'onboarding-card' },
      h('button', { class: 'onboarding-lang', onClick: onToggleLang }, T.langToggle),
      h('div', { class: 'onboarding-icon' }, '🧠'),
      h('h2', { class: 'onboarding-title' }, T.title),
      h('p', { class: 'onboarding-desc' }, T.desc),
      h('div', { class: 'onboarding-steps' },
        T.steps.map((step, i) =>
          h('div', { key: i, class: 'onboarding-step' },
            h('div', { class: 'onboarding-step-num' }, i + 1),
            h('div', null,
              h('strong', null, step.title),
              h('p', null, step.desc)
            )
          )
        )
      ),
      h('button', { class: 'btn-primary onboarding-btn', onClick: onGetStarted }, T.cta),
      h('button', { class: 'onboarding-skip', onClick: onSkip }, T.skip)
    )
  )
}

// ─── App ──────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(load)
  const [input, setInput] = useState('')
  const [query, setQuery] = useState('')
  const [queryResult, setQueryResult] = useState('')
  const [selectedCat, setSelectedCat] = useState(null)
  const [adding, setAdding] = useState(false)
  const [querying, setQuerying] = useState(false)
  const [loadingActions, setLoadingActions] = useState(null)
  const [apiKeyInput, setApiKeyInput] = useState('')
  const [showSettings, setShowSettings] = useState(false)
  const [error, setError] = useState('')
  const [editingId, setEditingId] = useState(null)
  const [editTitle, setEditTitle] = useState('')
  const [editOriginal, setEditOriginal] = useState('')
  const [editDueDate, setEditDueDate] = useState('')
  const [searchText, setSearchText] = useState('')
  const [toast, setToast] = useState(null)
  const [showExportMenu, setShowExportMenu] = useState(false)
  const toastTimer = useRef(null)

  const lang = data.lang || 'ja'
  const T = TRANSLATIONS[lang]

  useEffect(() => {
    document.title = T.appTitle
    document.documentElement.lang = lang
  }, [lang])

  const inputSpeech = useSpeech(text => setInput(prev => prev ? prev + ' ' + text : text), lang)
  const querySpeech = useSpeech(text => {
    setQuery(text)
    setTimeout(() => document.getElementById('qi')?.dispatchEvent(new CustomEvent('vs', {detail:text})), 100)
  }, lang)

  useEffect(() => {
    const d = load()
    if (d.apiKey) {
      setApiKeyInput(d.apiKey)
      if (!d.onboarded) {
        const updated = { ...d, onboarded: true }
        localStorage.setItem(KEY, JSON.stringify(updated))
        setData(updated)
      }
    } else if (d.onboarded) {
      setShowSettings(true)
    }
  }, [])

  useEffect(() => {
    const el = document.getElementById('qi')
    if (!el) return
    const handler = e => { if (e.detail && data.apiKey) handleQueryText(e.detail) }
    el.addEventListener('vs', handler)
    return () => el.removeEventListener('vs', handler)
  }, [data])

  const showToast = useCallback((message, onUndo) => {
    clearTimeout(toastTimer.current)
    setToast({ message, onUndo })
    toastTimer.current = setTimeout(() => setToast(null), 4000)
  }, [])

  const persist = useCallback(next => {
    setData(next)
    localStorage.setItem(KEY, JSON.stringify(next))
  }, [])

  const toggleLang = () => persist({ ...data, lang: lang === 'ja' ? 'en' : 'ja' })

  const saveApiKey = () => {
    const key = apiKeyInput.trim()
    if (!key) return
    persist({ ...data, apiKey: key, onboarded: true })
    setShowSettings(false); setError('')
  }

  const handleOnboardingStart = () => {
    persist({ ...data, onboarded: true })
    setShowSettings(true)
  }

  const handleOnboardingSkip = () => {
    persist({ ...data, onboarded: true })
  }

  const handleOnboardingLang = () => {
    persist({ ...data, lang: lang === 'ja' ? 'en' : 'ja' })
  }

  const handleAdd = async () => {
    if (!input.trim() || adding) return
    if (!data.apiKey) { setShowSettings(true); return }
    setAdding(true); setError('')
    try {
      const { title, category } = await categorizeTask(data.apiKey, input.trim(), data.categories, lang)
      const task = {
        id: `${Date.now()}-${Math.random().toString(36).slice(2)}`,
        originalText: input.trim(), title, category,
        nextActions: [], createdAt: new Date().toISOString(), status: 'active', priority: 'medium',
      }
      const cats = data.categories.includes(category) ? data.categories : [...data.categories, category]
      persist({ ...data, tasks: [task, ...data.tasks], categories: cats })
      setInput('')
    } catch (e) { setError(e.message || T.errorDefault) }
    finally { setAdding(false) }
  }

  const handleQueryText = async q => {
    if (!q.trim() || querying) return
    setQuerying(true); setQueryResult(''); setError('')
    try { setQueryResult(await queryTasks(data.apiKey, q.trim(), data.tasks, lang)) }
    catch (e) { setError(e.message || T.errorDefault) }
    finally { setQuerying(false) }
  }

  const handleQuery = () => handleQueryText(query)

  const handleSuggest = async taskId => {
    const task = data.tasks.find(t => t.id === taskId)
    if (!task) return
    setLoadingActions(taskId); setError('')
    try {
      const nextActions = await getNextActions(data.apiKey, task, lang)
      persist({ ...data, tasks: data.tasks.map(t => t.id === taskId ? {...t, nextActions} : t) })
    } catch (e) { setError(e.message || T.errorDefault) }
    finally { setLoadingActions(null) }
  }

  const toggleDone = id => persist({
    ...data,
    tasks: data.tasks.map(t => t.id === id ? {...t, status: t.status === 'done' ? 'active' : 'done'} : t)
  })

  const deleteTask = id => {
    const task = data.tasks.find(t => t.id === id)
    const next = { ...data, tasks: data.tasks.filter(t => t.id !== id) }
    persist(next)
    showToast(T.taskDeleted, () => {
      persist({ ...next, tasks: [task, ...next.tasks] })
      setToast(null)
    })
  }

  const startEdit = task => {
    setEditingId(task.id)
    setEditTitle(task.title)
    setEditOriginal(task.originalText)
    setEditDueDate(task.dueDate || '')
  }

  const saveEdit = () => {
    if (!editTitle.trim()) return
    persist({
      ...data,
      tasks: data.tasks.map(t => t.id === editingId
        ? {...t, title: editTitle.trim(), originalText: editOriginal.trim() || t.originalText, dueDate: editDueDate || null}
        : t)
    })
    setEditingId(null)
  }

  const cancelEdit = () => setEditingId(null)

  const togglePriority = id => persist({
    ...data,
    tasks: data.tasks.map(t => t.id === id ? {...t, priority: cyclePriority(t.priority || 'medium')} : t)
  })

  const clearAll = () => {
    if (!confirm(T.confirmClearAll)) return
    persist({ ...data, tasks: [], categories: [] }); setSelectedCat(null)
  }

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(data.tasks, null, 2)], { type: 'application/json' })
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url; a.download = `brain-dump-${new Date().toISOString().slice(0, 10)}.json`
    a.click(); URL.revokeObjectURL(url)
    setShowExportMenu(false)
  }

  const exportTextFile = () => {
    const ac = data.tasks.filter(t => t.status === 'active').length
    const dc = data.tasks.filter(t => t.status === 'done').length
    const dateStr = new Date().toLocaleDateString(T.locale)
    const lines = [T.exportHeader(dateStr), T.exportSummary(data.tasks.length, ac, dc), '']
    const groups = {}
    data.tasks.forEach(t => { (groups[t.category] = groups[t.category] || []).push(t) })
    Object.entries(groups).forEach(([cat, tasks]) => {
      lines.push(`## ${cat}`)
      tasks.forEach(t => {
        const st = t.status === 'done' ? T.exportStatusDone : T.exportStatusActive
        const pr = T.exportPriority[t.priority || 'medium']
        const due = t.dueDate ? ` ${T.exportDuePrefix}:${t.dueDate}` : ''
        lines.push(`${st} ${pr} ${t.title}${due}`)
        if (t.originalText !== t.title) lines.push(`    ${t.originalText}`)
        t.nextActions.forEach((a, i) => lines.push(`    ${i + 1}. ${a}`))
      })
      lines.push('')
    })
    const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' })
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url; a.download = `brain-dump-${new Date().toISOString().slice(0, 10)}.txt`
    a.click(); URL.revokeObjectURL(url)
    setShowExportMenu(false)
  }

  const search = searchText.trim().toLowerCase()
  const rawFiltered = data.tasks
    .filter(t => !selectedCat || t.category === selectedCat)
    .filter(t => !search ||
      t.title.toLowerCase().includes(search) ||
      t.originalText.toLowerCase().includes(search) ||
      t.category.toLowerCase().includes(search))
  const filtered = [...rawFiltered].sort((a, b) => {
    if (a.status !== b.status) return a.status === 'done' ? 1 : -1
    return (PRIORITY_ORDER[a.priority || 'medium']) - (PRIORITY_ORDER[b.priority || 'medium'])
  })
  const activeCount = data.tasks.filter(t => t.status === 'active').length
  const doneCount = data.tasks.filter(t => t.status === 'done').length
  const showOnboarding = !data.apiKey && !data.onboarded

  return h(Fragment, null,
    showOnboarding && h(Onboarding, {
      lang,
      onGetStarted: handleOnboardingStart,
      onSkip: handleOnboardingSkip,
      onToggleLang: handleOnboardingLang,
    }),
    h('div', { class: 'app' },

      // Header
      h('header', { class: 'header' },
        h('div', { class: 'header-left' },
          h('h1', null, '🧠 ', T.appTitle),
          data.tasks.length > 0 && h('span', { class: 'stats' }, T.statsText(activeCount, doneCount))
        ),
        h('div', { class: 'header-right' },
          h('button', { class: 'btn-ghost lang-btn', onClick: toggleLang,
            title: lang === 'ja' ? 'Switch to English' : '日本語に切り替え' }, T.langToggle),
          data.tasks.length > 0 && h('button', { class: 'btn-ghost danger', onClick: clearAll }, T.clearAll),
          data.tasks.length > 0 && h('div', { class: 'export-wrap' },
            h('button', { class: 'btn-ghost', onClick: () => setShowExportMenu(s => !s) }, T.export),
            showExportMenu && h(Fragment, null,
              h('div', { style: 'position:fixed;inset:0;z-index:99', onClick: () => setShowExportMenu(false) }),
              h('div', { class: 'export-menu' },
                h('button', { class: 'export-item', onClick: exportJSON }, T.exportJSON),
                h('button', { class: 'export-item', onClick: exportTextFile }, T.exportText)
              )
            )
          ),
          h('button', { class: 'btn-ghost', onClick: () => setShowSettings(s => !s) }, T.settings)
        )
      ),

      // Settings
      showSettings && h('div', { class: 'settings-panel' },
        h('h3', null, T.apiKeyTitle),
        h('p', { class: 'settings-intro' },
          T.apiKeyIntroPreLink,
          h('a', { href: 'https://console.anthropic.com/settings/keys', target: '_blank' }, T.apiKeyIntroLink),
          T.apiKeyIntroPostLink
        ),
        h('div', { class: 'row' },
          h('input', { type: 'password', class: 'input mono', value: apiKeyInput,
            placeholder: 'sk-ant-api03-...', onInput: e => setApiKeyInput(e.target.value),
            onKeyDown: e => e.key === 'Enter' && saveApiKey(), autofocus: true }),
          h('button', { class: 'btn-primary', onClick: saveApiKey }, T.save)
        ),
        h('p', { class: 'hint' }, T.apiKeyHint),
        data.apiKey && h('button', { class: 'btn-ghost', style: 'margin-top:8px', onClick: () => setShowSettings(false) }, T.cancel)
      ),

      // Input card
      h('div', { class: 'input-card' },
        h('div', { class: 'textarea-wrap' },
          h('textarea', {
            class: 'main-textarea', value: input, disabled: adding,
            placeholder: T.inputPlaceholder,
            onInput: e => setInput(e.target.value),
            onKeyDown: e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) handleAdd() },
          }),
          inputSpeech.supported && h('button', {
            class: `mic-btn ${inputSpeech.listening ? 'recording' : ''}`,
            onClick: inputSpeech.toggle,
          }, inputSpeech.listening ? '🔴' : '🎤')
        ),
        inputSpeech.listening && h('p', { class: 'voice-status' }, T.listening),
        h('div', { class: 'input-footer' },
          !inputSpeech.supported
            ? h('span', { class: 'no-voice' }, IS_PWA ? T.noVoicePwa : T.noVoice)
            : h('span', { class: 'hint' }, T.aiHint),
          h('button', { class: 'btn-primary', onClick: handleAdd, disabled: adding || !input.trim() },
            adding ? h(Fragment, null, h('span', { class: 'spin' }), ' ', T.categorizing) : T.addBtn)
        )
      ),

      // Error
      error && h('div', { class: 'error-banner' }, '⚠️ ', error),

      // Query bar
      h('div', { class: 'query-bar' },
        h('span', { class: 'query-icon' }, '🔍'),
        h('input', { id: 'qi', class: 'query-input', value: query,
          placeholder: T.queryPlaceholder,
          onInput: e => setQuery(e.target.value),
          onKeyDown: e => e.key === 'Enter' && handleQuery() }),
        querySpeech.supported && h('button', {
          class: `mic-btn-inline ${querySpeech.listening ? 'recording' : ''}`,
          onClick: querySpeech.toggle,
        }, querySpeech.listening ? '🔴' : '🎤'),
        h('button', { class: 'btn-secondary', onClick: handleQuery, disabled: querying || !query.trim() },
          querying ? '...' : T.queryBtn)
      ),

      // Query result
      queryResult && h('div', { class: 'query-result' },
        h('div', { class: 'qr-header' },
          h('strong', null, T.aiAnswer),
          h('button', { class: 'close-btn', onClick: () => setQueryResult('') }, '✕')
        ),
        h('div', { class: 'qr-body' }, queryResult.split('\n').map((line, i) => h('p', { key: i }, line)))
      ),

      // Search bar
      data.tasks.length > 0 && h('div', { class: 'search-bar' },
        h('span', { class: 'search-icon' }, '🔎'),
        h('input', {
          class: 'search-input',
          value: searchText,
          placeholder: T.searchPlaceholder,
          onInput: e => setSearchText(e.target.value),
        }),
        searchText && h('button', { class: 'search-clear', onClick: () => setSearchText('') }, '✕')
      ),

      // Category filter
      data.categories.length > 0 && h('div', { class: 'filter-bar' },
        h('button', {
          class: `chip ${selectedCat === null ? 'chip-active' : ''}`,
          onClick: () => setSelectedCat(null),
        }, T.filterAll, ' ', h('span', { class: 'count' }, data.tasks.length)),
        data.categories.map(cat => {
          const cnt = data.tasks.filter(t => t.category === cat).length
          const color = catColor(cat, data.categories)
          const isActive = selectedCat === cat
          return h('button', {
            key: cat,
            class: `chip ${isActive ? 'chip-active' : ''}`,
            style: isActive ? `background:${color};border-color:${color};color:#fff` : `--chip-color:${color}`,
            onClick: () => setSelectedCat(selectedCat === cat ? null : cat),
          }, cat, ' ', h('span', { class: 'count' }, cnt))
        })
      ),

      // Task list
      h('div', { class: 'task-list' },
        filtered.length === 0 && h('div', { class: 'empty-state' },
          data.tasks.length === 0
            ? h(Fragment, null,
                T.emptyMain, h('br'),
                h('small', null, T.emptyHint1), h('br'),
                h('small', null, T.emptyHint2))
            : search
              ? T.emptySearch(searchText)
              : T.emptyCat
        ),
        filtered.map(task => {
          const color = catColor(task.category, data.categories)
          const isEditing = editingId === task.id
          const pColor = PRIORITY_COLORS[task.priority || 'medium']
          const pLabel = T.priority[task.priority || 'medium']
          const dueDateInfo = getDueDateInfo(task.dueDate, T)
          return h(SwipeCard, {
            key: task.id,
            isDone: task.status === 'done',
            disabled: isEditing,
            onComplete: () => toggleDone(task.id),
            onDelete: () => deleteTask(task.id),
          },
            h('div', { class: 'task-top' },
              h('div', { class: 'task-labels' },
                h('span', { class: 'tag', style: `background:${color}22;color:${color};border-color:${color}55` }, task.category),
                h('button', { class: 'priority-badge',
                  style: `color:${pColor};border-color:${pColor}55;background:${pColor}18`,
                  onClick: () => togglePriority(task.id), title: T.priorityTitle }, pLabel),
                dueDateInfo && h('span', { class: `due-badge ${dueDateInfo.cls}` }, dueDateInfo.label),
                h('span', { class: 'task-date' }, new Date(task.createdAt).toLocaleDateString(T.locale, {month:'numeric',day:'numeric'}))
              ),
              h('div', { class: 'task-btns' },
                !isEditing && h('button', {
                  class: 'icon-btn', title: T.editTitle,
                  onClick: () => startEdit(task),
                }, '✏️'),
                h('button', {
                  class: `icon-btn ${task.status === 'done' ? 'icon-done' : ''}`,
                  onClick: () => toggleDone(task.id),
                  title: task.status === 'done' ? T.completeBtnTitleDone : T.completeBtnTitle,
                }, task.status === 'done' ? '↩' : '✓'),
                h('button', { class: 'icon-btn icon-del', title: T.deleteBtnTitle, onClick: () => deleteTask(task.id) }, '×')
              )
            ),

            // Edit mode
            isEditing
              ? h(Fragment, null,
                  h('input', {
                    class: 'edit-field', value: editTitle, autofocus: true,
                    onInput: e => setEditTitle(e.target.value),
                    onKeyDown: e => { if (e.key === 'Enter') saveEdit(); if (e.key === 'Escape') cancelEdit() },
                    placeholder: T.editTitlePlaceholder,
                  }),
                  h('textarea', {
                    class: 'edit-original', value: editOriginal,
                    onInput: e => setEditOriginal(e.target.value),
                    placeholder: T.editOriginalPlaceholder,
                  }),
                  h('div', { class: 'edit-date-row' },
                    h('span', { class: 'edit-date-label' }, T.dueDateLabel),
                    h('input', {
                      type: 'date', class: 'edit-date', value: editDueDate,
                      onInput: e => setEditDueDate(e.target.value),
                    }),
                    editDueDate && h('button', { class: 'btn-clear-date', onClick: () => setEditDueDate(''), title: T.clearDueDate }, T.clearDueDate)
                  ),
                  h('div', { class: 'edit-actions' },
                    h('button', { class: 'btn-save', onClick: saveEdit }, T.save),
                    h('button', { class: 'btn-cancel', onClick: cancelEdit }, T.cancel)
                  )
                )
              : h(Fragment, null,
                  h('h3', { class: 'task-title' }, task.title),
                  h('p', { class: 'task-original' }, task.originalText)
                ),

            task.nextActions.length > 0 && h('div', { class: 'actions-box', style: `border-left-color:${color}` },
              h('p', { class: 'actions-label', style: `color:${color}` }, T.nextActionsLabel),
              h('ol', { class: 'actions-list' }, task.nextActions.map((a, i) => h('li', { key: i }, a)))
            ),
            task.status !== 'done' && !isEditing && h('button', {
              class: 'suggest-btn', disabled: loadingActions === task.id,
              onClick: () => handleSuggest(task.id),
            }, loadingActions === task.id
              ? h(Fragment, null, h('span', { class: 'spin' }), ' ', T.thinking)
              : T.suggestBtn)
          )
        })
      )
    ),

    // Toast
    toast && h('div', { class: 'toast' },
      h('span', null, toast.message),
      h('button', { class: 'toast-undo', onClick: () => { toast.onUndo(); clearTimeout(toastTimer.current) } }, T.undoBtn)
    )
  )
}

render(h(App, null), document.getElementById('app'))
</script>
</body>
</html>
